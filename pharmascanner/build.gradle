apply plugin: "com.android.library"
apply plugin: 'org.jetbrains.kotlin.android'
apply from: '../nitrogen/generated/android/PharmaScannerCxx+autolinking.gradle'

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["PharmaScanner_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["PharmaScanner_" + name]).toInteger()
}

android {
  namespace "com.margelo.nitro.PharmaScanner"

  ndkVersion getExtOrDefault("ndkVersion")
  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")

    ndk {
      abiFilters "arm64-v8a", "x86_64"  // llama.cpp requires 64-bit (NEON FP16 on ARM)
    }

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++20"
        arguments "-DANDROID_STL=c++_shared",  // required — ReactAndroid uses shared STL
                  "-DCMAKE_BUILD_TYPE=Release"  // optimized builds for LLM inference
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  buildFeatures {
    prefab true  // required — lets CMake find fbjni/ReactAndroid/NitroModules via prefab
  }

  packagingOptions {
    excludes = [
      "META-INF",
      "META-INF/**",
      "**/libc++_shared.so",
      "**/libNitroModules.so",
      "**/libfbjni.so",
      "**/libjsi.so",
      "**/libreactnative.so",
      "**/libreactnativejni.so",
      "**/libreact_nativemodule_core.so",
    ]
  }

  buildTypes {
    release { minifyEnabled false }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation project(':react-native-nitro-modules')  // provides HybridObject Kotlin class

  // Coroutines (for Dispatchers.Default / Dispatchers.IO in LLM inference & download)
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"

  // Activity KTX (for ActivityResultRegistry)
  implementation "androidx.activity:activity-ktx:1.9.3"

  // CameraX
  implementation "androidx.camera:camera-core:1.4.1"
  implementation "androidx.camera:camera-camera2:1.4.1"
  implementation "androidx.camera:camera-lifecycle:1.4.1"
  implementation "androidx.camera:camera-view:1.4.1"

  // EXIF (for reading photo orientation)
  implementation "androidx.exifinterface:exifinterface:1.3.7"

  // ML Kit Document Scanner
  implementation "com.google.android.gms:play-services-mlkit-document-scanner:16.0.0"

  // ML Kit Barcode Scanning
  implementation "com.google.mlkit:barcode-scanning:17.3.0"

  // ML Kit Text Recognition (OCR)
  implementation "com.google.mlkit:text-recognition:16.0.1"
}
