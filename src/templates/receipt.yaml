name: receipt
version: 1

detection:
  keywords:
    - phieu thu
    - receipt
    - bien lai
    - cash receipt

sections:
  vendor:
    startAt: document_start
    endAt: document_end
    fields:
      name:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [cua hang, store, vendor, shop]
            extract: value_after_colon
            scope: full_text
      address:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [dia chi, address]
            extract: value_after_colon
            scope: full_text
      phone:
        type: string
        default: ""
        strategies:
          - method: regex
            pattern: '((?:0|\+84)\d[\d\s\.\-]{7,12})'
            scope: full_text

  meta:
    startAt: document_start
    endAt: document_end
    fields:
      date:
        type: string
        default: ""
        strategies:
          - method: regex
            pattern: '(\d{2}/\d{2}/\d{4})'
            scope: full_text
      receiptNumber:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [so phieu, receipt no, receipt number, "so:"]
            extract: value_after_colon
            scope: full_text

  totals:
    startAt: document_start
    endAt: document_end
    fields:
      subtotal:
        type: number
        default: 0
        strategies: []
      tax:
        type: number
        default: 0
        strategies: []
      total:
        type: number
        default: 0
        strategies:
          - method: keyword_label
            keywords: [tong, total, tong cong, grand total]
            extract: largest_number
            checkNextLine: true
            scope: full_text
      paymentMethod:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [thanh toan, payment, hinh thuc]
            extract: value_after_colon
            scope: full_text

confidence:
  maxScore: 0.25
  fields:
    - path: vendor.name
      type: non_empty
    - path: meta.date
      type: non_empty
    - path: totals.total
      type: non_zero
