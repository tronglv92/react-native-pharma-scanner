name: prescription
version: 1

detection:
  keywords:
    - don thuoc
    - prescription
    - benh nhan
    - chan doan

sections:
  patient:
    startAt: document_start
    endBefore:
      - doctor
    fields:
      name:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [ho ten, benh nhan, patient, patient name]
            extract: value_after_colon
            scope: full_text
      age:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [tuoi, age]
            extract: value_after_colon
            scope: full_text
      gender:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [gioi tinh, gender, sex]
            extract: value_after_colon
            scope: full_text
      address:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [dia chi, address]
            extract: value_after_colon
            scope: full_text
      diagnosis:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [chan doan, diagnosis]
            extract: value_after_colon
            scope: full_text

  doctor:
    startKeywords:
      - bac si
      - doctor
      - bs.
      - "bs:"
    endAt: document_end
    fields:
      name:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [bac si, doctor, bs., "bs:"]
            extract: value_after_colon
            scope: full_text
      department:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [khoa, department]
            extract: value_after_colon
            scope: full_text
      hospital:
        type: string
        default: ""
        strategies:
          - method: keyword_label
            keywords: [benh vien, hospital, phong kham, clinic]
            extract: value_after_colon
            scope: full_text

  medications:
    startAt: document_start
    endAt: document_end
    fields: {}

  meta:
    startAt: document_start
    endAt: document_end
    fields:
      date:
        type: string
        default: ""
        strategies:
          - method: regex
            pattern: '(\d{2}/\d{2}/\d{4})'
            scope: full_text
      notes:
        type: string
        default: ""
        strategies: []

confidence:
  maxScore: 0.3
  fields:
    - path: patient.name
      type: non_empty
    - path: patient.diagnosis
      type: non_empty
    - path: doctor.name
      type: non_empty
    - path: meta.date
      type: non_empty
